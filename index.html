<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warehouse Management System</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container" id="loginScreen">
    <h1>Admin Login</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" required />
      </div>
      <button type="submit" class="btn primary">Login</button>
      <p id="loginError" class="error"></p>
    </form>
  </div>

  <div class="container hidden" id="dashboard">
    <header>
      <h1>📦 Warehouse Management System</h1>
      <button id="logoutBtn" class="btn danger">Logout</button>
    </header>

    <!-- 📊 Stock Status Cards -->
    <section class="stats-grid" id="statsGrid">
      <div class="stat-card total">
        <div class="stat-label">Total Items</div>
        <p class="stat-number" id="statTotal">0</p>
        <div class="stat-bar">
          <div class="stat-bar-fill" id="totalBarFill" style="--percentage: 100%;"></div>
        </div>
      </div>

      <div class="stat-card low">
        <div class="stat-label">⚠️ Low Stock</div>
        <p class="stat-number" id="statLow">0</p>
        <div class="stat-bar">
          <div class="stat-bar-fill" id="lowBarFill" style="--percentage: 0%;"></div>
        </div>
      </div>

      <div class="stat-card out">
        <div class="stat-label">🔴 Out of Stock</div>
        <p class="stat-number" id="statOut">0</p>
        <div class="stat-bar">
          <div class="stat-bar-fill" id="outBarFill" style="--percentage: 0%;"></div>
        </div>
      </div>

      <div class="stat-card health">
        <div class="stat-label">📈 Health %</div>
        <p class="stat-number" id="statHealth">0%</p>
        <div class="stat-bar">
          <div class="stat-bar-fill" id="healthBarFill" style="--percentage: 0%;"></div>
        </div>
      </div>
    </section>

    <div id="alertsBox" class="alerts-box hidden"></div>

    <section class="buttons-row">
      <button id="btnAdd" class="btn">Add Item</button>
      <button id="btnClear" class="btn">Clear All</button>
      <button id="btnExport" class="btn">Download CSV</button>
    </section>

    <section class="form-card hidden" id="itemFormCard">
      <h2 id="formTitle">Add New Item</h2>
      <form id="itemForm">
        <input type="hidden" id="itemId" />
        <div class="form-group">
          <label for="itemName">Item Name</label>
          <input type="text" id="itemName" placeholder="Example: Milk" required />
        </div>
        <div class="form-group">
          <label for="itemCategory">Category</label>
          <select id="itemCategory" required>
            <option value="">Select Category</option>
            <option value="Food">Food</option>
            <option value="Equipment">Equipment</option>
            <option value="Supplies">Supplies</option>
          </select>
        </div>
        <div class="form-group">
          <label for="itemQuantity">Quantity</label>
          <input type="number" id="itemQuantity" min="0" value="1" required />
        </div>
        <div class="form-group">
          <label for="itemMinStock">Minimum Stock Alert</label>
          <input type="number" id="itemMinStock" min="0" value="5" required />
        </div>
        <div class="form-group">
          <label for="itemNote">Note</label>
          <input type="text" id="itemNote" placeholder="Example: Requires cooling" />
        </div>
        <button type="submit" class="btn primary">Save</button>
        <button type="button" id="cancelBtn" class="btn secondary">Cancel</button>
      </form>
    </section>

    <section>
      <h2>Items List</h2>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search for item..." />
      </div>
      <table class="items-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Minimum</th>
            <th>Status</th>
            <th>Note</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="itemsBody"></tbody>
      </table>
      <p id="emptyMessage" class="info">No items yet. Add one to get started.</p>
    </section>

    <!-- 📊 Category Analytics -->
    <section class="chart-section">
      <h2>📊 Inventory by Category</h2>
      <div style="position: relative; width: 100%; height: 300px;">
        <canvas id="categoryChart"></canvas>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
